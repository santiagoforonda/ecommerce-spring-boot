server:
  port: 8761
eureka:
  instance:
    hostname: discovery-server
  client:
    registerWithEureka: false
    fetchRegistry: false
    serviceUrl:
        defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
management:
    endpoints:
        web:
            exposure:
                include: health,beans,metrics,info,env,prometheus
    endpoint:
        health:
            show-details: always
